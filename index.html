<script>

function generateData(mult){

return [
[1.1700,1.1710,1.1690,1.1705],
[1.1705,1.1720,1.1700,1.1715],
[1.1715,1.1730,1.1710,1.1725],
[1.1725,1.1735,1.1715,1.1720],
[1.1720,1.1740,1.1718,1.1735],
[1.1735,1.1750,1.1730,1.1742],
[1.1742,1.1755,1.1738,1.1750],
[1.1750,1.1760,1.1740,1.1745],
[1.1745,1.1765,1.1742,1.1760],
[1.1760,1.1770,1.1750,1.1765]
].map(x=>x.map(v=>v+(Math.random()*0.001*mult)))

}

function makeChart(id,data){

var chart = echarts.init(document.getElementById(id));

chart.setOption({

backgroundColor:'#000',

grid:{
left:5,
right:45,
top:5,
bottom:20
},

xAxis:{
type:'category',
data:data.map((_,i)=>i),
axisLine:{lineStyle:{color:'#182230'}},
axisLabel:{color:'#6c7a89'}
},

yAxis:{
scale:true,
position:'right',
axisLine:{lineStyle:{color:'#182230'}},
axisLabel:{color:'#6c7a89'},
splitLine:{lineStyle:{color:'#182230'}}
},

series:[{
type:'candlestick',
data:data,
itemStyle:{
color:'#07f911',
color0:'#ff0015',
borderColor:'#07f911',
borderColor0:'#ff0015'
}
}]
});

}

makeChart('c1',generateData(1))   // 5m
makeChart('c2',generateData(2))   // 15m
makeChart('c3',generateData(3))   // 1h
makeChart('c4',generateData(4))   // 4h

</script>
